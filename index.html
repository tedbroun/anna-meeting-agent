<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анна</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #1a1a2e; color: white;
            font-family: Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        .container { text-align: center; }
        .avatar {
            width: 120px; height: 120px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; transition: box-shadow 0.3s;
        }
        .avatar.speaking {
            box-shadow: 0 0 30px rgba(102,126,234,0.8), 0 0 60px rgba(118,75,162,0.4);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .name { font-size: 24px; font-weight: bold; }
        .status { font-size: 14px; color: #aaa; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar" id="avatar">A</div>
        <div class="name">Анна</div>
        <div class="status" id="status">Loading...</div>
    </div>

    <script type="module">
        import { Conversation } from 'https://cdn.jsdelivr.net/npm/@elevenlabs/client@0.2.2/+esm';

        const avatar = document.getElementById('avatar');
        const status = document.getElementById('status');
        const AGENT_ID = 'agent_9001kmn7nwcbfjbr2fj0fw567048';

        async function start() {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                status.textContent = 'Connecting...';

                const conversation = await Conversation.startSession({
                    agentId: AGENT_ID,
                    connectionType: 'websocket',
                    overrides: {
                        agent: { language: 'uk' },
                        tts: {
                            voiceId: 'l0FRhtyn0AKRYadUAdgv',
                            optimizeStreamingLatency: 4,
                        },
                    },
                    onConnect: () => { status.textContent = 'Listening...'; },
                    onDisconnect: () => { status.textContent = 'Disconnected'; avatar.classList.remove('speaking'); },
                    onError: (err) => { status.textContent = 'Error: ' + (err.message || err); },
                    onModeChange: (mode) => {
                        if (mode.mode === 'speaking') {
                            avatar.classList.add('speaking');
                            status.textContent = 'Speaking...';
                        } else {
                            avatar.classList.remove('speaking');
                            status.textContent = 'Listening...';
                        }
                    },
                    onMessage: () => {},
                });
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
            }
        }

        start();
    </script>
</body>
</html>
