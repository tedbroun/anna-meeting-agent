<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анна</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #1a1a2e; color: white;
            font-family: Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        .container { text-align: center; }
        .avatar {
            width: 120px; height: 120px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; transition: box-shadow 0.3s;
        }
        .avatar.speaking {
            box-shadow: 0 0 30px rgba(102,126,234,0.8), 0 0 60px rgba(118,75,162,0.4);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .name { font-size: 24px; font-weight: bold; }
        .status { font-size: 14px; color: #aaa; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar" id="avatar">A</div>
        <div class="name">Анна</div>
        <div class="status" id="status">Loading SDK...</div>
    </div>

    <!-- Load ElevenLabs SDK via script tag (more compatible than ESM import) -->
    <script src="https://cdn.jsdelivr.net/npm/@elevenlabs/client@0.2.2/dist/index.umd.min.js"></script>
    <script>
        const avatar = document.getElementById('avatar');
        const status = document.getElementById('status');
        const AGENT_ID = 'agent_9001kmn7nwcbfjbr2fj0fw567048';

        async function start() {
            try {
                status.textContent = 'Requesting mic...';

                // Get microphone - Recall.ai Output Media provides meeting audio here
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    status.textContent = 'Mic OK, connecting...';
                } catch (micErr) {
                    status.textContent = 'Mic error: ' + micErr.message;
                    // Try without explicit mic request - Recall might auto-provide it
                }

                // Check if SDK loaded
                if (typeof ElevenLabsClient === 'undefined' && typeof Conversation === 'undefined') {
                    // Try alternative global names
                    const globals = Object.keys(window).filter(k => k.toLowerCase().includes('eleven') || k.toLowerCase().includes('conversation'));
                    status.textContent = 'SDK globals: ' + (globals.length ? globals.join(',') : 'none found');

                    // Fallback: try ESM import
                    try {
                        const mod = await import('https://cdn.jsdelivr.net/npm/@elevenlabs/client@0.2.2/+esm');
                        window._Conversation = mod.Conversation;
                        status.textContent = 'ESM loaded, connecting...';
                    } catch (esmErr) {
                        status.textContent = 'SDK load failed: ' + esmErr.message;
                        return;
                    }
                }

                // Get the Conversation class
                const ConvClass = window.Conversation || window._Conversation ||
                    (window.ElevenLabsClient && window.ElevenLabsClient.Conversation);

                if (!ConvClass) {
                    status.textContent = 'Conversation class not found';
                    return;
                }

                status.textContent = 'Starting session...';

                const conversation = await ConvClass.startSession({
                    agentId: AGENT_ID,
                    connectionType: 'websocket',
                    overrides: {
                        agent: { language: 'uk' },
                    },
                    onConnect: () => {
                        status.textContent = 'Listening...';
                    },
                    onDisconnect: () => {
                        status.textContent = 'Disconnected';
                        avatar.classList.remove('speaking');
                    },
                    onError: (err) => {
                        status.textContent = 'Error: ' + (err.message || JSON.stringify(err));
                    },
                    onModeChange: (mode) => {
                        if (mode.mode === 'speaking') {
                            avatar.classList.add('speaking');
                            status.textContent = 'Speaking...';
                        } else {
                            avatar.classList.remove('speaking');
                            status.textContent = 'Listening...';
                        }
                    },
                    onMessage: (msg) => {},
                });

            } catch (err) {
                status.textContent = 'Fatal: ' + err.message;
            }
        }

        // Start when page loads
        if (document.readyState === 'complete') {
            start();
        } else {
            window.addEventListener('load', start);
        }
    </script>
</body>
</html>
